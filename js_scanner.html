<script>
// *** OLD: invariato ***
let html5QrCode;
let isScanning = true;

/**
 * Inizializza l'oggetto scanner.
 * *** OLD: invariato ***
 */
function initScanner() {
  if (html5QrCode) return;
  html5QrCode = new Html5Qrcode("reader");
  startScanner();
}

/**
 * Avvia la fotocamera
 * *** OLD: invariato ***
 */
function startScanner() {
  const config = { 
    fps: 20, 
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0 
  };

  html5QrCode.start(
    { facingMode: "environment" },
    config,
    onScanSuccess
  ).catch(err => {
    console.error("Errore camera: ", err);
    document.getElementById('reader').innerHTML = `
      <div class="p-4 text-danger status-card">
        <p>⚠️ FOTOCAMERA NON DISPONIBILE</p>
        <small class="text-white">Controlla i permessi del browser</small>
      </div>`;
  });
}

/**
 * Gestisce la lettura del QR
 * *** OLD: invariato ***
 */
function onScanSuccess(decodedText) {
  if (!isScanning) return; 
  isScanning = false;
  
  html5QrCode.pause(); 
  document.getElementById('reader-container').classList.add('d-none');
  
  const loadingBox = document.getElementById('loading-scanner');
  loadingBox.classList.remove('d-none');

  google.script.run
    .withSuccessHandler(showResult)
    .withFailureHandler(showError)
    .convalidaIngresso(decodedText, CONFIG.evento, CONFIG.staff);
}

/**
 * Mostra l'esito dello scan (VAI o STOP)
 * ✅ MODIFICATO: gestisce messaggi pasto/dance + badge + messaggio gentile
 */
function showResult(res) {
  document.getElementById('loading-scanner').classList.add('d-none');
  const box = document.getElementById('result-box');
  const resTitle = document.getElementById('res-title');
  const resName = document.getElementById('res-name');
  const resInfo = document.getElementById('res-info');
  const pastoBadge = document.getElementById('res-pasto-badge');
  
  box.classList.remove('d-none');

  if (res.success) {
    // ═══════════════════════════════════════════════════════════════
    // CASO: INGRESSO VALIDO
    // *** OLD: stessa struttura, messaggi ora vengono dal server ***
    // Il server manda già il messaggio corretto:
    //   - "DANCE OK" / "DANCE OK (Cena saltata)" / "CENA + DANCE OK"
    // Quindi il frontend li mostra e basta, senza logica propria
    // ═══════════════════════════════════════════════════════════════
    resTitle.innerText = "VAI! ✅";
    resTitle.style.color = "#1db954";
    resName.innerText = res.cliente;
    resInfo.innerText = res.msg;
    resInfo.style.color = "#ffffff";
    
  } else if (res.nonAncoraOra) {
    // ═══════════════════════════════════════════════════════════════
    // NUOVO: Caso speciale — cliente solo-dance in finestra pasto
    // QR valido, prenotazione attiva, ma non è il suo turno
    // Messaggio gentile con colore arancione (non rosso errore)
    // ═══════════════════════════════════════════════════════════════
    resTitle.innerText = "⏳ NON ANCORA";
    resTitle.style.color = "#FFC107";  // Arancione/warning, non rosso
    resName.innerText = res.cliente;
    resInfo.innerHTML = '<span style="color: #FFC107;">' + res.msg + '</span>';
    
  } else {
    // ═══════════════════════════════════════════════════════════════
    // CASO: ERRORE (GIA' ENTRATO / QR ERRATO / ANNULLATA / etc.)
    // *** OLD: invariato ***
    // ═══════════════════════════════════════════════════════════════
    resTitle.innerText = "STOP! ❌";
    resTitle.style.color = "#ff4444";
    resName.innerText = res.cliente || "SCONOSCIUTO";
    resInfo.innerHTML = '<span style="color: #ff4444;">' + res.msg.toUpperCase() + '</span>';
    console.warn("Accesso negato:", res.msg);
  }
  
  // ═══════════════════════════════════════════════════════════════
  // NUOVO: Badge pasto — mostra se include_pasto = true
  // (dalla NEW v10, mantenuto)
  // ═══════════════════════════════════════════════════════════════
  if (res.include_pasto) {
    pastoBadge.classList.remove('d-none');
  } else {
    pastoBadge.classList.add('d-none');
  }
}

/**
 * Gestione errori di rete o crash server
 * *** OLD: invariato ***
 */
function showError(err) {
  document.getElementById('loading-scanner').classList.add('d-none');
  document.getElementById('result-box').classList.remove('d-none');
  const resTitle = document.getElementById('res-title');
  
  resTitle.innerText = "ERRORE SERVER";
  resTitle.style.color = "#ff4444";
  document.getElementById('res-info').innerText = "CONNESSIONE PERSA O ERRORE DB";
  console.error("Errore critico Google Script:", err);
}

/**
 * Reset per il prossimo cliente: riaccende la camera
 * *** OLD: invariato, con aggiunta reset badge ***
 */
function resetScanner() {
  isScanning = true;
  document.getElementById('result-box').classList.add('d-none');
  document.getElementById('reader-container').classList.remove('d-none');
  
  // NUOVO: Nascondi badge pasto per il prossimo scan
  document.getElementById('res-pasto-badge').classList.add('d-none');
  
  if (html5QrCode) {
    html5QrCode.resume();
  }
}
</script>
