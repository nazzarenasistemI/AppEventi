<script>
  var listaEventiLocali = [];

  // ═══════════════════════════════════════════════════════════════
  // GESTIONE CAMPI PASTO — MODIFICATO: toggle sezione intera
  // ═══════════════════════════════════════════════════════════════

  function toggleCampiPasto() {
    const tipoEvento = document.getElementById('tipo_evento').value;
    const sezionePranzoCena = document.getElementById('sezione-pranzo-cena');
    
    if (tipoEvento === 'SOLO_DANZA') {
      sezionePranzoCena.style.display = 'none';
    } else {
      sezionePranzoCena.style.display = 'block';
    }
  }

  // *** OLD: invariato ***
  function caricaEventi() {
    console.log("Modulo Eventi: Caricamento dati...");
    google.script.run
      .withSuccessHandler(data => {
        renderEventi(data);
      })
      .getListaEventi();
  }

  // *** OLD: invariato ***
  function suggerisciOrari(dataValue) {
    if(!dataValue || document.getElementById('id').value !== "") return;
    document.getElementById('fine_prenotazione').value = dataValue + "T22:00";
    document.getElementById('inizio_checkin').value = dataValue + "T23:30";
    let domani = new Date(dataValue);
    domani.setDate(domani.getDate() + 1);
    let domaniStr = domani.toISOString().split('T')[0];
    document.getElementById('fine_checkin').value = domaniStr + "T04:00";
  }

  // ═══════════════════════════════════════════════════════════════
  // RENDER CARD EVENTI — MODIFICATO: 2 contatori party/pasto
  // ═══════════════════════════════════════════════════════════════

  function renderEventi(eventi) {
    listaEventiLocali = eventi || [];
    const container = document.getElementById('lista-eventi');
    container.innerHTML = "";
    
    const oggi = new Date().setHours(0,0,0,0);
    const oraAttuale = new Date();
    const mostraPassati = document.getElementById('filtroPassati').checked;

    if (listaEventiLocali.length === 0) {
      container.innerHTML = '<div class="col-12 text-center p-5 text-muted">Nessun evento trovato.</div>';
      return;
    }

    listaEventiLocali.forEach(evt => {
        const dataEvt = new Date(evt.data_evento).setHours(0,0,0,0);
        const isPassato = dataEvt < oggi;
        if (isPassato && !mostraPassati) return;

        // ═══════════════════════════════════════════════════════════
        // NUOVO: conteggi separati
        // ═══════════════════════════════════════════════════════════
        const haPasto = evt.tipo_evento && evt.tipo_evento !== 'SOLO_DANZA';
        const capienzaParty = evt.max_partecipanti || 0;
        const capienzaPasto = evt.max_partecipanti_pasto || 0;
        const prenotatiParty = evt.conteggio_party || 0;
        const prenotatiPasto = evt.conteggio_pasto || 0;
        const checkin = evt.checkin_effettuati || 0;

        const finePre = evt.fine_prenotazione ? new Date(evt.fine_prenotazione) : null;
        const inizoCk = evt.inizio_checkin ? new Date(evt.inizio_checkin) : null;
        const fineCk = evt.fine_checkin ? new Date(evt.fine_checkin) : null;

        let badgePrenotazioni = '';
        let badgeTempo = '';
        let badgePasto = '';
        
        // ═══════════════════════════════════════════════════════════
        // BADGE TIPO PASTO — *** OLD: invariato ***
        // ═══════════════════════════════════════════════════════════
        if (evt.tipo_evento === 'CON_CENA') {
          badgePasto = '<span class="badge bg-warning text-dark">🍽️ CENA</span>';
        } else if (evt.tipo_evento === 'CON_PRANZO') {
          badgePasto = '<span class="badge bg-warning text-dark">🍽️ PRANZO</span>';
        }
        
        if (isPassato) {
            badgePrenotazioni = '<span class="badge bg-dark border border-secondary text-muted">CHIUSO</span>';
            badgeTempo = '<span class="badge bg-dark border border-secondary text-muted text-uppercase">Archiviato</span>';
        } else {
            // ═══════════════════════════════════════════════════════
            // NUOVO: Sold out basato su party (non più totale)
            // ═══════════════════════════════════════════════════════
            badgePrenotazioni = '<span class="badge bg-success">PRENOTAZIONI APERTE</span>';
            if (capienzaParty > 0 && prenotatiParty >= capienzaParty) {
                badgePrenotazioni = '<span class="badge bg-danger">SOLD OUT PARTY</span>';
            } else if (finePre && oraAttuale > finePre) {
                badgePrenotazioni = '<span class="badge bg-warning text-dark">PRENOTAZIONI CHIUSE</span>';
            } else if (!evt.attivo) {
                badgePrenotazioni = '<span class="badge bg-secondary">OFFLINE</span>';
            }
            
            // Badge sold out PASTO separato
            if (haPasto && capienzaPasto > 0 && prenotatiPasto >= capienzaPasto) {
              badgePasto += '<br><small class="badge bg-danger mt-1" style="font-size:9px;">PASTO SOLD OUT</small>';
            } else if (haPasto) {
              // Badge prenotazioni pasto chiuse per deadline
              const finePastoPre = evt.fine_prenotazione_pasto ? new Date(evt.fine_prenotazione_pasto) : null;
              if (finePastoPre && oraAttuale > finePastoPre) {
                badgePasto += '<br><small class="badge bg-secondary mt-1" style="font-size:9px;">Pasto Chiuso</small>';
              }
            }
            
            // Badge check-in DANCE — *** OLD: invariato ***
            badgeTempo = '<span class="badge border border-secondary text-muted">IN ATTESA</span>';
            if (inizoCk && fineCk && oraAttuale >= inizoCk && oraAttuale <= fineCk) {
                badgeTempo = '<span class="badge bg-primary animate-pulse">CHECK-IN LIVE</span>';
            } else if (fineCk && oraAttuale > fineCk) {
                badgeTempo = '<span class="badge bg-dark border border-secondary">TERMINATO</span>';
            }
            
            // Badge check-in PASTO — *** OLD: invariato ***
            if (haPasto && evt.inizio_checkin_pasto && evt.fine_checkin_pasto) {
              const inizioPasto = new Date(evt.inizio_checkin_pasto);
              const finePasto = new Date(evt.fine_checkin_pasto);
              
              if (oraAttuale >= inizioPasto && oraAttuale <= finePasto) {
                badgeTempo += '<br><span class="badge bg-warning text-dark mt-1 animate-pulse" style="font-size:10px;">🍽️ CHECK-IN PASTO LIVE</span>';
              } else if (oraAttuale > finePasto && fineCk && oraAttuale < fineCk) {
                badgeTempo += '<br><small class="badge bg-dark border border-secondary mt-1" style="font-size:9px;">Pasto Terminato</small>';
              }
            }
        }

        // ═══════════════════════════════════════════════════════════
        // CARD — MODIFICATO: footer con 2 o 3 colonne
        // SOLO_DANZA: 2 colonne (Party / Check-in)
        // CON_PASTO:  3 colonne (Party / Pasto / Check-in)
        // ═══════════════════════════════════════════════════════════
        
        let footerHtml = '';
        
        if (haPasto) {
          // 3 colonne: Party | Pasto | Check-in
          footerHtml = `
            <div class="row g-0 mt-auto pt-3 border-top border-secondary text-center">
               <div class="col-4 border-end border-secondary">
                  <div class="label-box">🎉 Party</div>
                  <div class="fw-bold fs-5 ${!isPassato && capienzaParty > 0 && prenotatiParty >= capienzaParty ? 'text-danger' : 'text-success'}">
                    ${prenotatiParty} <span class="text-white opacity-50 fs-6" style="font-weight:normal">/ ${capienzaParty || '∞'}</span>
                  </div>
               </div>
               <div class="col-4 border-end border-secondary">
                  <div class="label-box">🍽️ Pasto</div>
                  <div class="fw-bold fs-5 ${!isPassato && capienzaPasto > 0 && prenotatiPasto >= capienzaPasto ? 'text-danger' : 'text-warning'}">
                    ${prenotatiPasto} <span class="text-white opacity-50 fs-6" style="font-weight:normal">/ ${capienzaPasto || '∞'}</span>
                  </div>
               </div>
               <div class="col-4">
                  <div class="label-box">Check-in</div>
                  <div class="fw-bold fs-5 text-info">${checkin}</div>
               </div>
            </div>`;
        } else {
          // 2 colonne: Party | Check-in (layout OLD)
          footerHtml = `
            <div class="row g-0 mt-auto pt-3 border-top border-secondary text-center">
               <div class="col-6 border-end border-secondary">
                  <div class="label-box">🎉 Party</div>
                  <div class="fw-bold fs-5 ${!isPassato && capienzaParty > 0 && prenotatiParty >= capienzaParty ? 'text-danger' : 'text-success'}">
                    ${prenotatiParty} <span class="text-white opacity-50 fs-6" style="font-weight:normal">/ ${capienzaParty || '∞'}</span>
                  </div>
               </div>
               <div class="col-6">
                  <div class="label-box">Check-in</div>
                  <div class="fw-bold fs-5 text-info">${checkin}</div>
               </div>
            </div>`;
        }

        container.innerHTML += `
        <div class="col-md-6 col-lg-4">
          <div class="card card-evento p-3 h-100 shadow-sm ${isPassato ? 'card-archiviato' : ''}" 
                onclick="apriModaleModifica('${evt.id}')" style="cursor:pointer">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div class="d-flex flex-column gap-1">
                ${badgePrenotazioni}
                ${badgePasto}
                ${badgeTempo}
              </div>
              <span class="small fw-bold text-success" style="background: rgba(29,185,84,0.1); padding: 2px 8px; border-radius: 5px;">${evt.codice_evento}</span>
            </div>
            <h5 class="fw-bold mb-1 text-white">${evt.nome_evento}</h5>
            <div class="small text-white opacity-50 mb-3">
              <i class="bi bi-calendar3 me-1 text-success"></i> ${new Date(evt.data_evento).toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' })}
            </div>
            ${footerHtml}
          </div>
        </div>`;
    });
  }

  // *** OLD: invariato ***
  function apriModaleNuovo() {
    document.getElementById('formEvento').reset();
    document.getElementById('id').value = "";
    document.getElementById('btnElimina').classList.add('d-none');
    document.getElementById('modalTitolo').innerText = "Crea Nuovo Evento";
    
    document.getElementById('tipo_evento').value = 'SOLO_DANZA';
    toggleCampiPasto();
    
    var m = bootstrap.Modal.getOrCreateInstance(document.getElementById('modalEvento'));
    m.show();
  }

  // ═══════════════════════════════════════════════════════════════
  // MODIFICA — Caricamento campi (tipo_evento ora in testata)
  // ═══════════════════════════════════════════════════════════════
  function apriModaleModifica(id) {
    const evt = listaEventiLocali.find(e => e.id === id);
    if (!evt) return;
    
    // Campi base
    document.getElementById('id').value = evt.id;
    document.getElementById('codice_evento').value = evt.codice_evento;
    document.getElementById('nome_evento').value = evt.nome_evento;
    document.getElementById('data_evento').value = evt.data_evento;
    document.getElementById('attivo').value = evt.attivo.toString();
    document.getElementById('max_partecipanti').value = evt.max_partecipanti;
    document.getElementById('descrizione').value = evt.descrizione || "";
    
    // NUOVO: tipo_evento ora è in testata
    document.getElementById('tipo_evento').value = evt.tipo_evento || 'SOLO_DANZA';
    toggleCampiPasto();
    
    // Campi party
    if(evt.fine_prenotazione) document.getElementById('fine_prenotazione').value = evt.fine_prenotazione.slice(0,16);
    if(evt.inizio_checkin) document.getElementById('inizio_checkin').value = evt.inizio_checkin.slice(0,16);
    if(evt.fine_checkin) document.getElementById('fine_checkin').value = evt.fine_checkin.slice(0,16);
    document.getElementById('prezzo_solo_danza').value = evt.prezzo_solo_danza || '';
    document.getElementById('messaggio_prezzo_danza').value = evt.messaggio_prezzo_danza || '';
    document.getElementById('visualizza_prezzo_danza').checked = evt.visualizza_prezzo_danza || false;
    
    // Campi pasto
    document.getElementById('pasto_obbligatorio').value = (evt.pasto_obbligatorio || false).toString();
    document.getElementById('prezzo_con_pasto').value = evt.prezzo_con_pasto || '';
    document.getElementById('max_partecipanti_pasto').value = evt.max_partecipanti_pasto || '';
    if(evt.fine_prenotazione_pasto) document.getElementById('fine_prenotazione_pasto').value = evt.fine_prenotazione_pasto.slice(0,16);
    if(evt.inizio_checkin_pasto) document.getElementById('inizio_checkin_pasto').value = evt.inizio_checkin_pasto.slice(0,16);
    if(evt.fine_checkin_pasto) document.getElementById('fine_checkin_pasto').value = evt.fine_checkin_pasto.slice(0,16);
    document.getElementById('messaggio_post_registrazione').value = evt.messaggio_post_registrazione || '';
    
    document.getElementById('btnElimina').classList.remove('d-none');
    document.getElementById('modalTitolo').innerText = "Modifica Evento";
    var m = bootstrap.Modal.getOrCreateInstance(document.getElementById('modalEvento'));
    m.show();
  }

  // ═══════════════════════════════════════════════════════════════
  // SALVATAGGIO — MODIFICATO: rimossa validazione max_pasto <= max
  // ═══════════════════════════════════════════════════════════════
  function handleSalva() {
    const payload = {
      id: document.getElementById('id').value,
      codice_evento: document.getElementById('codice_evento').value.toUpperCase().trim(),
      nome_evento: document.getElementById('nome_evento').value,
      data_evento: document.getElementById('data_evento').value,
      attivo: document.getElementById('attivo').value === 'true',
      max_partecipanti: parseInt(document.getElementById('max_partecipanti').value) || 0,
      fine_prenotazione: document.getElementById('fine_prenotazione').value,
      inizio_checkin: document.getElementById('inizio_checkin').value,
      fine_checkin: document.getElementById('fine_checkin').value,
      descrizione: document.getElementById('descrizione').value,
      
      // Tipo evento (ora in testata)
      tipo_evento: document.getElementById('tipo_evento').value,
      
      // Campi party
      prezzo_solo_danza: parseFloat(document.getElementById('prezzo_solo_danza').value) || null,
      messaggio_prezzo_danza: document.getElementById('messaggio_prezzo_danza').value || null,
      visualizza_prezzo_danza: document.getElementById('visualizza_prezzo_danza').checked,
      
      // Campi pasto
      pasto_obbligatorio: document.getElementById('pasto_obbligatorio').value === 'true',
      prezzo_con_pasto: parseFloat(document.getElementById('prezzo_con_pasto').value) || null,
      max_partecipanti_pasto: parseInt(document.getElementById('max_partecipanti_pasto').value) || null,
      fine_prenotazione_pasto: document.getElementById('fine_prenotazione_pasto').value || null,
      inizio_checkin_pasto: document.getElementById('inizio_checkin_pasto').value || null,
      fine_checkin_pasto: document.getElementById('fine_checkin_pasto').value || null,
      messaggio_post_registrazione: document.getElementById('messaggio_post_registrazione').value || null
    };
    
    console.log("PAYLOAD INVIATO:", payload);
    
    if (!payload.codice_evento || !payload.nome_evento || !payload.data_evento) {
      alert("⚠️ Campi obbligatori mancanti!");
      return;
    }
    
    // RIMOSSA: vecchia validazione max_pasto <= max_partecipanti
    // (ora sono indipendenti: party e pasto hanno capienze separate)
    
    google.script.run.withSuccessHandler(res => {
      if(res.success) { 
        bootstrap.Modal.getInstance(document.getElementById('modalEvento')).hide();
        caricaEventi();
      } else { alert("Errore: " + res.msg); }
    }).salvaEvento(payload);
  }

  // *** OLD: invariato ***
  function handleElimina() {
    const id = document.getElementById('id').value;
    const codice = document.getElementById('codice_evento').value;
    if(!confirm(`Sei sicuro di voler eliminare l'evento ${codice}?`)) return;
    google.script.run.withSuccessHandler(res => {
      if(res.success) { 
        bootstrap.Modal.getInstance(document.getElementById('modalEvento')).hide();
        caricaEventi();
      } else { alert(res.msg); }
    }).eliminaEvento(id, codice);
  }
  
  // *** OLD: invariato ***
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof cambiaVista === 'undefined') { 
      caricaEventi(); 
    }
  });
</script>
