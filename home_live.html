<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="container-fluid py-3">
  <!-- *** OLD: invariato — Selector evento *** -->
  <div class="d-flex justify-content-between align-items-center mb-4 bg-dark p-2 rounded shadow-sm border border-secondary">
    <div class="flex-grow-1">
      <select id="select-evento-live" class="form-select form-select-lg bg-black text-white border-success" 
              style="font-weight: bold; font-size: 1.1rem; border-width: 2px; width: 100%;" 
              onchange="cambiaEventoLive(this.value)">
        <option value="">Caricamento...</option>
      </select>
    </div>
    
    <div id="status-badge" class="ms-3 me-2">
        <div id="live-indicator" class="spinner-grow text-success d-none" 
             style="width: 1.2rem; height: 1.2rem;" 
             role="status">
        </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- KPI BOX — NUOVO: 2 box dinamici party/pasto                   -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="kpi-container" class="row g-2 mb-4">
    <!-- Popolato dinamicamente da JS -->
  </div>

  <!-- *** OLD: invariato (struttura) — Grafico *** -->
  <div class="row g-3 mb-4">
    <div class="col-12">
      <div class="card bg-dark border-secondary p-3 shadow-sm">
        <h6 class="fw-bold mb-3 text-uppercase opacity-75">Andamento Prenotazioni</h6>
        <div style="height: 200px;">
          <canvas id="bookingChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- *** OLD: invariato — PR + Tabella *** -->
  <div class="row g-3">
    <div class="col-lg-5">
      <div class="card bg-dark border-secondary p-3 h-100 shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-3">
           <h6 class="fw-bold mb-0 text-success text-uppercase">Performance PR</h6>
           <small class="text-muted" style="font-size: 0.6rem;">Clicca per dettagli</small>
        </div>
        <div id="classifica-pr-container" class="overflow-auto" style="max-height: 450px;">
          <div class="text-center p-4 opacity-50">Nessun dato</div>
        </div>
      </div>
    </div>

    <div class="col-lg-7">
      <div class="card bg-dark border-secondary p-3 h-100 shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-3">
           <h6 class="fw-bold mb-0 text-uppercase">Ultimi Iscritti</h6>
           <button class="btn btn-sm btn-success px-3" onclick="apriGestione()">
             <i class="bi bi-list-check me-1"></i> Vedi Lista Completa
           </button>
        </div>
        <div class="table-responsive">
          <table class="table table-dark table-borderless table-hover table-sm mb-0">
            <thead><tr>
              <th class="small text-uppercase opacity-50">Nome</th>
              <th class="small text-uppercase opacity-50">PR</th>
              <th class="small text-uppercase opacity-50 text-end">Stato</th>
            </tr></thead>
            <tbody id="tabella-live-body">
              <tr><td colspan="3" class="text-center p-3 opacity-50">Lista vuota</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  window.timerLiveHome = window.timerLiveHome || null;
  window.eventoSelezionatoManualmente = window.eventoSelezionatoManualmente || null;
  let EVENTO_ID = null;
  let MAX_PARTY = 0;
  let MAX_PASTO = 0;
  let TIPO_EVENTO = 'SOLO_DANZA';
  let listaEventiLive = [];
  let myChart = null;

  // *** OLD: invariato — caricaHome ***
  function caricaHome() {
    if (window.timerLiveHome) clearInterval(window.timerLiveHome);

    google.script.run
      .withSuccessHandler(res => {
        const oggi = new Date().setHours(0,0,0,0);
        listaEventiLive = res.eventi.sort((a, b) => new Date(a.data_evento) - new Date(b.data_evento));

        const select = document.getElementById('select-evento-live');
        select.innerHTML = listaEventiLive.map(e => 
          `<option value="${e.id}">${e.nome_evento} (${new Date(e.data_evento).toLocaleDateString()})</option>`
        ).join('');

        let idDaCaricare = window.eventoSelezionatoManualmente;
        if (!idDaCaricare) {
          const prossimo = listaEventiLive.find(e => new Date(e.data_evento).setHours(0,0,0,0) >= oggi);
          idDaCaricare = prossimo ? prossimo.id : (listaEventiLive[0] ? listaEventiLive[0].id : null);
        }

        if(idDaCaricare) {
          select.value = idDaCaricare;
          cambiaEventoLive(idDaCaricare, false);
        }
      })
      .getTuttiIDati();
  }

  // ═══════════════════════════════════════════════════════════════
  // MODIFICATO: salva tipo_evento + max pasto + genera KPI box
  // ═══════════════════════════════════════════════════════════════
  function cambiaEventoLive(id, daUtente = true) {
    if (!id) return;
    if (daUtente) window.eventoSelezionatoManualmente = id;

    const evento = listaEventiLive.find(e => e.id == id);
    if (!evento) return;

    EVENTO_ID = evento.id;
    MAX_PARTY = evento.max_partecipanti || 0;
    MAX_PASTO = evento.max_partecipanti_pasto || 0;
    TIPO_EVENTO = evento.tipo_evento || 'SOLO_DANZA';
    
    // Genera struttura KPI in base al tipo evento
    generaKpiBox();
    
    document.getElementById('live-indicator').classList.remove('d-none');
    recuperaDatiLive();
    
    if (window.timerLiveHome) clearInterval(window.timerLiveHome);
    window.timerLiveHome = setInterval(recuperaDatiLive, 30000);
  }

  // ═══════════════════════════════════════════════════════════════
  // NUOVO: Genera i box KPI in base al tipo evento
  // ═══════════════════════════════════════════════════════════════
  function generaKpiBox() {
    const container = document.getElementById('kpi-container');
    const haPasto = TIPO_EVENTO !== 'SOLO_DANZA';
    const labelPasto = TIPO_EVENTO === 'CON_PRANZO' ? 'Pranzo' : 'Cena';
    
    if (haPasto) {
      // 2 box affiancati: Party + Pasto
      container.innerHTML = `
        <div class="col-md-6">
          <div class="card bg-dark border-success p-3 h-100 shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="text-uppercase fw-bold text-success" style="font-size: 0.75rem;">🎉 Party</span>
              <span class="badge bg-success bg-opacity-25 text-success" id="kpi-party-checkin" style="font-size: 0.7rem;">Check-in: 0</span>
            </div>
            <div class="d-flex align-items-baseline gap-2">
              <span id="kpi-party-prenotati" class="fw-bold" style="font-size: 2.2rem; line-height: 1;">0</span>
              <span class="opacity-50" style="font-size: 1.1rem;">/ ${MAX_PARTY || '∞'}</span>
              <span id="kpi-party-perc" class="ms-auto fw-bold text-success" style="font-size: 1.1rem;">0%</span>
            </div>
            <div class="progress mt-2" style="height: 6px; background: rgba(255,255,255,0.1);">
              <div id="kpi-party-bar" class="progress-bar bg-success" style="width: 0%; transition: width 0.5s;"></div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card bg-dark border-warning p-3 h-100 shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="text-uppercase fw-bold text-warning" style="font-size: 0.75rem;">🍽️ ${labelPasto}</span>
              <span class="badge bg-warning bg-opacity-25 text-warning" id="kpi-pasto-checkin" style="font-size: 0.7rem;">Check-in: 0</span>
            </div>
            <div class="d-flex align-items-baseline gap-2">
              <span id="kpi-pasto-prenotati" class="fw-bold" style="font-size: 2.2rem; line-height: 1;">0</span>
              <span class="opacity-50" style="font-size: 1.1rem;">/ ${MAX_PASTO || '∞'}</span>
              <span id="kpi-pasto-perc" class="ms-auto fw-bold text-warning" style="font-size: 1.1rem;">0%</span>
            </div>
            <div class="progress mt-2" style="height: 6px; background: rgba(255,255,255,0.1);">
              <div id="kpi-pasto-bar" class="progress-bar bg-warning" style="width: 0%; transition: width 0.5s;"></div>
            </div>
          </div>
        </div>`;
    } else {
      // 1 box full width: solo Party
      container.innerHTML = `
        <div class="col-12">
          <div class="card bg-dark border-success p-3 h-100 shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="text-uppercase fw-bold text-success" style="font-size: 0.75rem;">🎉 Party</span>
              <span class="badge bg-success bg-opacity-25 text-success" id="kpi-party-checkin" style="font-size: 0.7rem;">Check-in: 0</span>
            </div>
            <div class="d-flex align-items-baseline gap-2">
              <span id="kpi-party-prenotati" class="fw-bold" style="font-size: 2.2rem; line-height: 1;">0</span>
              <span class="opacity-50" style="font-size: 1.1rem;">/ ${MAX_PARTY || '∞'}</span>
              <span id="kpi-party-perc" class="ms-auto fw-bold text-success" style="font-size: 1.1rem;">0%</span>
            </div>
            <div class="progress mt-2" style="height: 6px; background: rgba(255,255,255,0.1);">
              <div id="kpi-party-bar" class="progress-bar bg-success" style="width: 0%; transition: width 0.5s;"></div>
            </div>
          </div>
        </div>`;
    }
  }

  // *** OLD: invariato — recuperaDatiLive ***
  function recuperaDatiLive() {
    if (!EVENTO_ID) return;
    document.getElementById('live-indicator').style.opacity = "1";

    google.script.run
      .withSuccessHandler(prenotazioni => {
        aggiornaInterfaccia(prenotazioni);
        document.getElementById('live-indicator').style.opacity = "0.3";
      })
      .homeGetDatiLive(EVENTO_ID);

    google.script.run
      .withSuccessHandler(res => {
        renderizzaGrafico(res);
      })
      .homeGetDatiGrafico(EVENTO_ID);
  }

  // ═══════════════════════════════════════════════════════════════
  // MODIFICATO: Grafico con 3 linee (party verde, pasto giallo, totale bianco)
  // Per SOLO_DANZA: solo linea verde
  // ═══════════════════════════════════════════════════════════════
  function renderizzaGrafico(res) {
    const canvas = document.getElementById('bookingChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (myChart) myChart.destroy();

    const haPasto = TIPO_EVENTO !== 'SOLO_DANZA';
    
    const datasets = [];
    
    // Linea verde: Party (sempre presente)
    datasets.push({
      label: '🎉 Party',
      data: haPasto ? res.party : res.totale,
      borderColor: '#1db954',
      backgroundColor: 'rgba(29, 185, 84, 0.08)',
      borderWidth: 2,
      fill: !haPasto,
      tension: 0.4,
      pointRadius: 3
    });
    
    if (haPasto) {
      // Linea gialla: Pasto
      datasets.push({
        label: '🍽️ ' + (TIPO_EVENTO === 'CON_PRANZO' ? 'Pranzo' : 'Cena'),
        data: res.pasto,
        borderColor: '#FFC107',
        backgroundColor: 'rgba(255, 193, 7, 0.08)',
        borderWidth: 2,
        fill: false,
        tension: 0.4,
        pointRadius: 3
      });
      
      // Linea bianca: Totale
      datasets.push({
        label: 'Totale',
        data: res.totale,
        borderColor: 'rgba(255, 255, 255, 0.6)',
        borderDash: [5, 5],
        borderWidth: 1.5,
        fill: false,
        tension: 0.4,
        pointRadius: 2
      });
    }

    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: res.labels,
        datasets: datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { 
          legend: { 
            display: haPasto,
            labels: { color: 'rgba(255,255,255,0.7)', font: { size: 11 } }
          } 
        },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1, color: 'rgba(255,255,255,0.5)' }, grid: { color: 'rgba(255,255,255,0.05)' } },
          x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.5)' } }
        }
      }
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // MODIFICATO: aggiornaInterfaccia con split party/pasto
  // ═══════════════════════════════════════════════════════════════
  function aggiornaInterfaccia(dati) {
    if (!dati) return;
    const haPasto = TIPO_EVENTO !== 'SOLO_DANZA';
    
    // Split conteggi
    const partyPrenotati = dati.filter(p => !p.include_pasto).length;
    const pastoPrenotati = dati.filter(p => p.include_pasto === true).length;
    const partyEntrati = dati.filter(p => !p.include_pasto && p.entrato).length;
    const pastoEntrati = dati.filter(p => p.include_pasto === true && p.entrato).length;
    
    // ═══════════════════════════════════════════════════
    // BOX PARTY (sempre presente)
    // ═══════════════════════════════════════════════════
    const percParty = MAX_PARTY > 0 ? Math.round((partyPrenotati / MAX_PARTY) * 100) : 0;
    
    document.getElementById('kpi-party-prenotati').innerText = partyPrenotati;
    document.getElementById('kpi-party-checkin').innerText = 'Check-in: ' + partyEntrati;
    document.getElementById('kpi-party-perc').innerText = percParty + '%';
    
    const barParty = document.getElementById('kpi-party-bar');
    barParty.style.width = Math.min(percParty, 100) + '%';
    // Colore progress bar: verde → giallo → rosso
    if (percParty >= 95) {
      barParty.className = 'progress-bar bg-danger';
    } else if (percParty >= 80) {
      barParty.className = 'progress-bar bg-warning';
    } else {
      barParty.className = 'progress-bar bg-success';
    }
    
    // Numero grande: rosso se sold out
    const numParty = document.getElementById('kpi-party-prenotati');
    numParty.style.color = (MAX_PARTY > 0 && partyPrenotati >= MAX_PARTY) ? '#dc3545' : '#fff';
    
    // ═══════════════════════════════════════════════════
    // BOX PASTO (solo se haPasto)
    // ═══════════════════════════════════════════════════
    if (haPasto) {
      const percPasto = MAX_PASTO > 0 ? Math.round((pastoPrenotati / MAX_PASTO) * 100) : 0;
      
      document.getElementById('kpi-pasto-prenotati').innerText = pastoPrenotati;
      document.getElementById('kpi-pasto-checkin').innerText = 'Check-in: ' + pastoEntrati;
      document.getElementById('kpi-pasto-perc').innerText = percPasto + '%';
      
      const barPasto = document.getElementById('kpi-pasto-bar');
      barPasto.style.width = Math.min(percPasto, 100) + '%';
      if (percPasto >= 95) {
        barPasto.className = 'progress-bar bg-danger';
      } else if (percPasto >= 80) {
        barPasto.className = 'progress-bar bg-warning';  
      } else {
        barPasto.className = 'progress-bar bg-warning';
      }
      
      const numPasto = document.getElementById('kpi-pasto-prenotati');
      numPasto.style.color = (MAX_PASTO > 0 && pastoPrenotati >= MAX_PASTO) ? '#dc3545' : '#fff';
    }

    // ═══════════════════════════════════════════════════
    // CLASSIFICA PR — *** OLD: invariato ***
    // ═══════════════════════════════════════════════════
    const prStats = {};
    dati.forEach(p => {
      const nick = p.pr_nickname || "Generico";
      prStats[nick] = (prStats[nick] || 0) + 1;
    });

    const containerPR = document.getElementById('classifica-pr-container');
    containerPR.innerHTML = Object.entries(prStats)
      .sort((a,b) => b[1] - a[1])
      .map(([nick, count]) => `
        <div class="d-flex justify-content-between align-items-center mb-2 p-2 bg-black bg-opacity-25 rounded border-start border-success border-3" 
             style="cursor: pointer;" onclick="apriGestione('${nick}')">
          <span class="small fw-bold">@${nick}</span>
          <span class="badge bg-success rounded-pill">${count}</span>
        </div>
      `).join('') || '<div class="text-center p-4 opacity-50 small">Nessuna prenotazione</div>';

    // ═══════════════════════════════════════════════════
    // TABELLA RECENTI — *** OLD: invariato ***
    // ═══════════════════════════════════════════════════
    const tabella = document.getElementById('tabella-live-body');
    tabella.innerHTML = dati.slice(-10).reverse().map(p => `
      <tr>
        <td class="py-2">${p.cliente_nome} ${p.cliente_cognome}</td>
        <td class="text-success small">@${p.pr_nickname}</td>
        <td class="text-end">${(p.entrato === true || String(p.entrato) === "true") ? '✅' : '⏳'}</td>
      </tr>
    `).join('') || '<tr><td colspan="3" class="text-center p-3 opacity-50">Lista vuota</td></tr>';
  }

  // *** OLD: invariato — apriGestione ***
  function apriGestione(filtroPR = null) {
    if (!EVENTO_ID) return;
    window.filtroGestioneEvento = EVENTO_ID;
    window.filtroGestionePR = filtroPR;
    
    if (typeof caricaModulo === 'function') {
      caricaModulo('gestione_prenotazioni');
    }
  }

  caricaHome();
</script>
