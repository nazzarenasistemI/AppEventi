<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    body {
      background-color: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .logo-container {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-container i {
      font-size: 3rem;
      color: #1ed760;
    }
    .form-control {
      background-color: #222 !important;
      border: 1px solid #444 !important;
      color: #fff !important;
      padding: 12px;
      border-radius: 10px;
    }
    .form-control:focus {
      border-color: #1ed760 !important;
      box-shadow: 0 0 0 0.25rem rgba(30, 215, 96, 0.25);
    }
    .btn-login {
      background-color: #1ed760;
      border: none;
      color: #000;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      margin-top: 1rem;
      transition: all 0.3s;
    }
    .btn-login:hover {
      background-color: #1db954;
      transform: scale(1.02);
    }
    .spinner-border {
      display: none;
    }
    #error-msg {
      color: #ff4444;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo-container">
    <i class="bi bi-shield-lock-fill"></i>
    <h2 class="mt-2 fw-bold">PUNTA VIDA</h2>
    <p class="text-muted small">Accesso Riservato Staff</p>
  </div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="mb-3">
      <label class="form-label small opacity-50">NICKNAME</label>
      <input type="text" id="username" class="form-control" placeholder="Inserisci nickname" required autocomplete="username">
    </div>
    
    <div class="mb-4">
      <label class="form-label small opacity-50">PIN SEGRETO</label>
      <input type="password" id="pin" class="form-control" placeholder="••••" inputmode="numeric" pattern="[0-9]*" maxlength="6" required autocomplete="current-password">
    </div>

    <button type="submit" id="btn-text" class="btn-login">
      ENTRA
      <div class="spinner-border spinner-border-sm ms-2" role="status" id="login-spinner"></div>
    </button>
    
    <div id="error-msg">Nickname o PIN errati.</div>
  </form>
</div>

<script>
  // Al caricamento, controlliamo se esiste già una sessione
  window.onload = function() {
    const sessione = localStorage.getItem('sessione_punta_vida');
    if (sessione) {
      // Se esiste, reindirizziamo subito alla dashboard
      // (Aggiungeremo il controllo validità in seguito)
      window.location.href = "<?= ScriptApp.getService().getUrl() ?>?page=dashboard";
    }
  };

  function handleLogin(e) {
    e.preventDefault();
    
    const user = document.getElementById('username').value;
    const pin = document.getElementById('pin').value;
    const errorMsg = document.getElementById('error-msg');
    const spinner = document.getElementById('login-spinner');
    
    errorMsg.style.display = 'none';
    spinner.style.display = 'inline-block';
    document.getElementById('btn-text').disabled = true;

    // Chiamata al server (Funzione che creeremo in Logic_Staff.gs)
    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          // Salviamo la sessione nel browser
          localStorage.setItem('sessione_punta_vida', JSON.stringify(res.user));
          // Reindirizziamo
          window.location.href = "<?= ScriptApp.getService().getUrl() ?>?page=dashboard";
        } else {
          spinner.style.display = 'none';
          document.getElementById('btn-text').disabled = false;
          errorMsg.style.display = 'block';
          errorMsg.innerText = res.msg;
        }
      })
      .withFailureHandler(err => {
        spinner.style.display = 'none';
        document.getElementById('btn-text').disabled = false;
        alert("Errore di connessione: " + err.message);
      })
      .checkLoginStaff(user, pin);
  }
</script>

</body>
</html>
