    <div class="mt-4" id="footer-ui">
       <button class="btn btn-outline-light btn-sm opacity-25 border-0" onclick="ricaricaPagina()">Reset Camera</button>
    </div>

  <script>
    // *** OLD: invariato ***
    const CONFIG = {
      evento: "<?= eventoCodice ?>",
      staff: "<?= nicknameStaff ?>"
    };

    // *** OLD: invariato ***
    function ricaricaPagina() {
      const url = "<?= ScriptApp.getService().getUrl() ?>?page=scanner&evento=" + CONFIG.evento + "&staff=" + CONFIG.staff;
      window.top.location.href = url;
    }

    window.onload = function() {
      google.script.run
        .withSuccessHandler(function(res) {
          // *** OLD: invariato ***
          document.getElementById('display-evento').innerText = res.nomeEvento || CONFIG.evento;
          document.getElementById('display-staff').innerText = "STAFF: " + (res.nomeStaff || CONFIG.staff);

          if (res.authorized) {
            if (res.troppoPresto) {
              // ═══════════════════════════════════════════════════════════
              // MODIFICATO: usa msgAttesa se presente (eventi con pasto)
              // altrimenti cade sul messaggio OLD per retrocompatibilità
              // ═══════════════════════════════════════════════════════════
              const msgTesto = res.msgAttesa || 
                `Il check-in apre alle ore <b>${res.oraApertura}</b>`;
              renderStatusMessage("🕒 ACCESSO ANTICIPATO", msgTesto, "#1db954");
            } else {
              document.getElementById('lock-screen').classList.add('d-none');
              document.getElementById('reader-container').classList.remove('d-none');
              
              // ═══════════════════════════════════════════════════════════
              // NUOVO: Mostra indicatore modalità nell'header
              // Solo per eventi con pasto — SOLO_DANZA non mostra nulla
              // ═══════════════════════════════════════════════════════════
              if (res.modalita && res.tipo_evento !== 'SOLO_DANZA') {
                const divModalita = document.getElementById('display-modalita');
                if (res.modalita === 'PASTO') {
                  divModalita.innerHTML = '<span class="modalita-badge modalita-pasto">🍽️ CHECK-IN PASTO</span>';
                } else {
                  divModalita.innerHTML = '<span class="modalita-badge modalita-dance">💃 CHECK-IN DANCE</span>';
                }
                divModalita.classList.remove('d-none');
              }
              
              if (typeof initScanner === "function") initScanner();
            }
          } else {
            // *** OLD: invariato ***
            renderStatusMessage("⚠️ ATTENZIONE", res.msg, "#ff4444");
          }
        })
        .withFailureHandler(function(err) {
          // *** OLD: invariato ***
          renderStatusMessage("❌ ERRORE", "Errore di connessione al database", "#ff4444");
        })
        .verificaAccessoScanner(CONFIG.evento, CONFIG.staff);
    };

    // *** OLD: invariato ***
    function renderStatusMessage(titolo, messaggio, colore) {
      document.getElementById('lock-screen').classList.add('d-none');
      document.getElementById('main-content-area').innerHTML = `
        <div class="status-card shadow-lg mx-2">
          <h2 class="fw-bold" style="color: ${colore}">${titolo}</h2>
          <p class="fs-5 text-white mt-3">${messaggio}</p>
          <button class="btn btn-light mt-4 fw-bold" style="border-radius:15px; padding: 10px 25px;" onclick="ricaricaPagina()">VERIFICA ORA</button>
        </div>
      `;
    }
  </script>
