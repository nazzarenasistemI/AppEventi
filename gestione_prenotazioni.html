<script>
  // ═══════════════════════════════════════════════════════════════
  // 1. Variabili Globali di Stato
  // MODIFICATO: aggiunto G_EVENTO_INFO per dati evento completi
  // ═══════════════════════════════════════════════════════════════
  let G_EVENTO_ID = window.filtroGestioneEvento || window.eventoSelezionatoManualmente || null;
  let G_PR_NICK = window.filtroGestionePR || "ALL";
  let G_SEARCH_QUERY = "";
  let DATI_LOCALI = [];
  let CHECK_IN_APERTO_SERVER = false;
  let G_EVENTO_INFO = null;  // NUOVO: oggetto evento completo per tipo_evento, fine_prenotazione_pasto
  let G_SCROLL_POS = 0;      // NUOVO: posizione scroll da ripristinare
  let G_LISTA_PR = [];        // NUOVO: lista PR per cambio PR

  // *** OLD: invariato ***
  function inizializzaGestione() {
    caricaDatiGestione();
  }

  // 3. Caricamento Dati dal Server
  // MODIFICATO: salva G_EVENTO_INFO + salva scroll position
  function caricaDatiGestione() {
    // NUOVO: salva posizione scroll prima del reload
    const scrollContainer = document.querySelector('#modulo-gestione .table-responsive');
    if (scrollContainer) G_SCROLL_POS = scrollContainer.scrollTop;
    
    const corpo = document.getElementById('corpo-tabella-gestione');
    if (corpo) corpo.innerHTML = '<tr><td colspan="4" class="text-center py-5"><div class="spinner-border text-success"></div></td></tr>';
    
    google.script.run
      .withSuccessHandler(res => {
        if (!res) return;
        
        DATI_LOCALI = res.prenotazioni || [];
        CHECK_IN_APERTO_SERVER = res.checkInAperto;
        G_EVENTO_INFO = res.evento || null;  // NUOVO: salvo evento completo
        G_LISTA_PR = res.listaPR || [];      // NUOVO: salvo lista PR per cambio PR
        
        if (!G_EVENTO_ID) G_EVENTO_ID = res.idSelezionato;

        popolaSelettori(res.listaEventi || [], res.listaPR || []);
        renderizzaTabellaGestione();
        
        window.filtroGestionePR = null;
        window.filtroGestioneEvento = null;
      })
      .getDatiGestionePrenotazioni(G_EVENTO_ID);
  }

  // ═══════════════════════════════════════════════════════════════
  // 4. Rendering Tabella con Filtri
  // MODIFICATO: badge pasto, bottone toggle pasto, info pasto nel check-in
  // ═══════════════════════════════════════════════════════════════
  function renderizzaTabellaGestione() {
    const corpo = document.getElementById('corpo-tabella-gestione');
    if (!corpo) return;

    // *** OLD: invariato — Filtro PR ***
    let filtrati = (G_PR_NICK === "ALL") 
      ? DATI_LOCALI 
      : DATI_LOCALI.filter(p => p.pr_nickname && p.pr_nickname.toLowerCase().trim() === G_PR_NICK.toLowerCase().trim());

    // *** OLD: invariato — Filtro Ricerca Cliente ***
    if (G_SEARCH_QUERY) {
      const query = G_SEARCH_QUERY.toLowerCase().trim();
      filtrati = filtrati.filter(p => {
        const nome = (p.cliente_nome + ' ' + (p.cliente_cognome || '')).toLowerCase();
        const email = (p.cliente_email || '').toLowerCase();
        return nome.includes(query) || email.includes(query);
      });
    }

    if (filtrati.length === 0) {
      corpo.innerHTML = '<tr><td colspan="4" class="text-center py-5 opacity-50">Nessuna prenotazione trovata.</td></tr>';
      return;
    }

    // ═══════════════════════════════════════════════════════════════
    // NUOVO: Ordinamento alfabetico per cognome + nome
    // ═══════════════════════════════════════════════════════════════
    filtrati.sort((a, b) => {
      const cognomeA = (a.cliente_cognome || '').toLowerCase().trim();
      const cognomeB = (b.cliente_cognome || '').toLowerCase().trim();
      if (cognomeA !== cognomeB) return cognomeA.localeCompare(cognomeB, 'it');
      const nomeA = (a.cliente_nome || '').toLowerCase().trim();
      const nomeB = (b.cliente_nome || '').toLowerCase().trim();
      return nomeA.localeCompare(nomeB, 'it');
    });

    // NUOVO: determina se l'evento ha pasto (per mostrare/nascondere bottone toggle)
    const eventoHaPasto = G_EVENTO_INFO && G_EVENTO_INFO.tipo_evento && G_EVENTO_INFO.tipo_evento !== 'SOLO_DANZA';

    corpo.innerHTML = filtrati.map(p => {
      const entrato = (p.entrato === true || String(p.entrato) === "true");
      const annullata = (p.stato === 'ANNULLATA');
      const haPasto = (p.include_pasto === true || String(p.include_pasto) === "true");
      
      // ═══════════════════════════════════════════════════════════════
      // Badge stato + badge pasto inline
      // MODIFICATO: aggiunto simbolo 🍽️ accanto allo stato se include_pasto
      // ═══════════════════════════════════════════════════════════════
      let badgeStato = '';
      const badgePasto = haPasto ? '<span class="badge-pasto-inline">🍽️ Pasto</span>' : '';
      
      if (annullata) {
        badgeStato = '<span class="badge badge-danger-custom">✗ ANNULLATA</span>';
      } else if (entrato) {
        badgeStato = '<span class="badge badge-success-custom">✓ ENTRATO</span>';
      } else {
        badgeStato = '<span class="badge badge-warning-custom">⏳ ATTESA</span>';
      }
      
      const highlightClass = G_SEARCH_QUERY ? 'highlight-search' : '';
      const nomeCompleto = `${p.cliente_nome} ${p.cliente_cognome || ''}`;
      const emailCliente = p.cliente_email || '';
      
      // ═══════════════════════════════════════════════════════════════
      // Bottone Check-in
      // MODIFICATO: passa haPasto alla funzione eseguiCheckIn
      // ═══════════════════════════════════════════════════════════════
      let htmlAzioneCheckIn = "";
      if (annullata) {
        htmlAzioneCheckIn = `<button class="btn btn-sm btn-dark disabled" title="Prenotazione annullata"><i class="bi bi-x-circle opacity-25"></i></button>`;
      } else if (entrato) {
        htmlAzioneCheckIn = `<button class="btn btn-sm btn-success disabled" style="background:#1db954 !important; border:none;"><i class="bi bi-check-lg text-black"></i></button>`;
      } else if (CHECK_IN_APERTO_SERVER) {
        htmlAzioneCheckIn = `<button class="btn btn-sm btn-outline-success" onclick="eseguiCheckIn('${p.id}', '${nomeCompleto.replace(/'/g, "\\'")}', '${emailCliente}', ${haPasto})" title="Check-in Manuale"><i class="bi bi-person-check"></i></button>`;
      } else {
        htmlAzioneCheckIn = `<button class="btn btn-sm btn-dark disabled" title="Check-in non ancora aperto"><i class="bi bi-lock-fill opacity-25"></i></button>`;
      }

      // *** OLD: invariato — Bottone Reinvia QR ***
      const btnReinvia = annullata 
        ? `<button class="btn btn-sm btn-dark disabled ms-1" title="Non disponibile"><i class="bi bi-envelope opacity-25"></i></button>`
        : `<button class="btn btn-sm btn-outline-warning ms-1" onclick="reinviaQR('${p.id}')" title="Reinvia QR"><i class="bi bi-envelope"></i></button>`;

      // *** OLD: invariato — Bottone Annulla/Riattiva ***
      const btnAzione = annullata
        ? `<button class="btn btn-sm btn-outline-primary ms-1" onclick="riattivaPrenotazione('${p.id}')" title="Riattiva Prenotazione"><i class="bi bi-arrow-clockwise"></i></button>`
        : `<button class="btn btn-sm btn-outline-danger ms-1" onclick="annullaPrenotazione('${p.id}')" title="Annulla"><i class="bi bi-trash"></i></button>`;

      // ═══════════════════════════════════════════════════════════════
      // NUOVO: Bottone Toggle Pasto (solo per eventi con pasto)
      // Icona: pieno se ha pasto (rimuovi), vuoto se non ha (aggiungi)
      // Non mostrato per prenotazioni annullate o già entrate
      // ═══════════════════════════════════════════════════════════════
      let btnTogglePasto = '';
      if (eventoHaPasto && !annullata && !entrato) {
        if (haPasto) {
          btnTogglePasto = `<button class="btn btn-sm btn-outline-pasto ms-1" onclick="togglePasto('${p.id}', '${nomeCompleto.replace(/'/g, "\\'")}', true)" title="Rimuovi Pasto"><i class="bi bi-cup-hot-fill"></i></button>`;
        } else {
          btnTogglePasto = `<button class="btn btn-sm btn-outline-pasto ms-1" onclick="togglePasto('${p.id}', '${nomeCompleto.replace(/'/g, "\\'")}', false)" title="Aggiungi Pasto"><i class="bi bi-cup-hot"></i></button>`;
        }
      }

      // ═══════════════════════════════════════════════════════════════
      // NUOVO: Bottone Cambio PR (per prenotazioni non annullate)
      // ═══════════════════════════════════════════════════════════════
      let btnCambiaPR = '';
      if (!annullata) {
        btnCambiaPR = `<button class="btn btn-sm btn-outline-info ms-1" onclick="cambiaPR('${p.id}', '${nomeCompleto.replace(/'/g, "\\'")}', '${p.pr_nickname}', '${p.pr_id || ''}')" title="Cambia PR"><i class="bi bi-people-fill"></i></button>`;
      }

      return `
        <tr class="${annullata ? 'riga-annullata' : (entrato ? 'riga-entrato' : '')}">
          <td class="${highlightClass}">
            <div class="fw-bold">${nomeCompleto}</div>
            <div class="small opacity-50">${emailCliente}</div>
          </td>
          <td class="text-success small fw-bold">@${p.pr_nickname}</td>
          <td class="text-center">${badgeStato}${badgePasto}</td>
          <td class="text-end px-3">
            <div class="btn-group">
              ${htmlAzioneCheckIn}
              ${btnReinvia}
              ${btnTogglePasto}
              ${btnCambiaPR}
              ${btnAzione}
            </div>
          </td>
        </tr>
      `;
    }).join('');
    
    // NUOVO: ripristina posizione scroll dopo rendering
    if (G_SCROLL_POS > 0) {
      const scrollContainer = document.querySelector('#modulo-gestione .table-responsive');
      if (scrollContainer) {
        requestAnimationFrame(() => { scrollContainer.scrollTop = G_SCROLL_POS; });
      }
    }
  }

  // *** OLD: invariato ***
  function filtraRicercaCliente() {
    const input = document.getElementById('search-cliente');
    G_SEARCH_QUERY = input ? input.value : '';
    renderizzaTabellaGestione();
  }

  // *** OLD: invariato ***
  function homeInviaReportAction() {
    if (!G_EVENTO_ID) return;
    
    const prSelezionato = document.getElementById('gestione-select-pr').value;
    const isGlobal = (prSelezionato === "ALL");
    
    google.script.run.withSuccessHandler(emailPredefinita => {
      Swal.fire({
        title: 'Invia Report CSV',
        text: isGlobal ? "Report globale" : `Report di @${prSelezionato}`,
        input: 'email',
        inputValue: emailPredefinita || '',
        showCancelButton: true,
        confirmButtonText: 'INVIA ORA',
        cancelButtonText: 'ANNULLA',
        background: '#1e1e1e',
        color: '#fff',
        confirmButtonColor: '#1db954'
      }).then((result) => {
        if (result.isConfirmed && result.value) {
          Swal.fire({ title: 'Invio...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }, background: '#1e1e1e', color: '#fff' });
          
          google.script.run.withSuccessHandler(msg => {
            Swal.fire({ title: 'Esito', text: msg, icon: 'success', background: '#1e1e1e', color: '#fff' });
          }).homeInviaReport(G_EVENTO_ID, isGlobal ? null : prSelezionato, result.value);
        }
      });
    }).getEmailPerReport(prSelezionato);
  }

  // ═══════════════════════════════════════════════════════════════
  // 7. Azioni Prenotazione
  // ═══════════════════════════════════════════════════════════════

  /**
   * Check-in manuale
   * MODIFICATO: aggiunto parametro haPasto, mostra info pasto nella dialog
   */
  function eseguiCheckIn(id, nomeCliente, emailCliente, haPasto) {
    // NUOVO: sezione info pasto nella dialog
    const infoPasto = haPasto 
      ? `<div style="margin-top: 10px; padding: 8px 12px; background: rgba(255, 193, 7, 0.15); border: 1px solid rgba(255, 193, 7, 0.4); border-radius: 8px;">
           <span style="color: #FFC107; font-weight: bold; font-size: 14px;">🍽️ CON PASTO</span>
         </div>`
      : '';

    Swal.fire({
      title: 'Check-in Manuale',
      html: `
        <div style="text-align: left; padding: 15px; background: rgba(29, 185, 84, 0.1); border-radius: 8px; margin-top: 15px;">
          <p style="color: #1db954; font-weight: bold; margin-bottom: 10px;">
            <i class="bi bi-person-check" style="font-size: 1.2em;"></i> Stai facendo entrare:
          </p>
          <p style="font-size: 16px; font-weight: bold; color: #fff; margin: 5px 0;">
            ${nomeCliente}
          </p>
          <p style="font-size: 13px; color: #999; margin: 5px 0;">
            ${emailCliente}
          </p>
          ${infoPasto}
        </div>
        <p style="font-size: 14px; color: #999; margin-top: 15px;">
          Confermi l'ingresso manuale?
        </p>
      `,
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'SÌ, FAI ENTRARE',
      cancelButtonText: 'ANNULLA',
      background: '#1e1e1e',
      color: '#fff',
      confirmButtonColor: '#1db954',
      cancelButtonColor: '#6c757d'
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({
          title: 'Check-in in corso...',
          allowOutsideClick: false,
          allowEscapeKey: false,
          didOpen: () => { Swal.showLoading(); },
          background: '#1e1e1e',
          color: '#fff'
        });
        
        google.script.run.withSuccessHandler(successo => {
          if (successo) {
            Swal.fire({ 
              title: 'Entrato!', 
              text: nomeCliente + ' è stato registrato.',
              icon: 'success', 
              background: '#1e1e1e', 
              color: '#fff', 
              timer: 2000,
              showConfirmButton: false 
            });
            setTimeout(() => caricaDatiGestione(), 1500);
          } else {
            Swal.fire({
              title: 'Errore',
              text: 'Impossibile completare il check-in. Riprova.',
              icon: 'error',
              background: '#1e1e1e',
              color: '#fff'
            });
          }
        }).azioneCheckInManuale(id);
      }
    });
  }

  // *** OLD: invariato ***
  function reinviaQR(id) {
    Swal.fire({
      title: 'Reinviare Email?',
      text: "Verrà inviata nuovamente l'email con il QR Code",
      icon: 'info',
      showCancelButton: true,
      confirmButtonText: 'SÌ, REINVIA',
      background: '#1e1e1e',
      color: '#fff',
      confirmButtonColor: '#1db954'
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({ title: 'Invio...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }, background: '#1e1e1e', color: '#fff' });
        google.script.run.withSuccessHandler(r => {
          Swal.fire({ title: r ? 'Inviato!' : 'Errore', icon: r ? 'success' : 'error', background: '#1e1e1e', color: '#fff' });
        }).azioneReinviaQR(id);
      }
    });
  }

  // *** OLD: invariato ***
  function annullaPrenotazione(id) {
    Swal.fire({
      title: 'Annullare Prenotazione?',
      html: `
        <p style="font-size: 14px; color: #999; margin-top: 10px; line-height: 1.6;">
          La prenotazione sarà annullata (non eliminata).<br>
          Il cliente potrà ri-registrarsi successivamente.
        </p>
      `,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#dc3545',
      cancelButtonColor: '#6c757d',
      confirmButtonText: 'Sì, Annulla',
      cancelButtonText: 'No',
      background: '#1e1e1e',
      color: '#fff'
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({ title: 'Annullamento...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }, background: '#1e1e1e', color: '#fff' });
        
        google.script.run
          .withSuccessHandler(function(success) {
            if (success) {
              Swal.fire({ 
                title: 'Annullata', 
                text: 'Il cliente potrà ri-registrarsi.',
                icon: 'success', 
                background: '#1e1e1e', 
                color: '#fff', 
                timer: 2000,
                showConfirmButton: false 
              });
              setTimeout(() => caricaDatiGestione(), 1500);
            } else {
              Swal.fire({ title: 'Errore', text: 'Impossibile annullare.', icon: 'error', background: '#1e1e1e', color: '#fff' });
            }
          })
          .azioneAnnullaPrenotazione(id);
      }
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // NUOVO: Toggle Pasto Admin
  // Dialog con avviso se prenotazioni pasto scadute
  // ═══════════════════════════════════════════════════════════════
  function togglePasto(id, nomeCliente, haGiaPasto) {
    const azione = haGiaPasto ? 'Rimuovere' : 'Aggiungere';
    const nuovoValore = !haGiaPasto;
    const iconaTitolo = haGiaPasto ? '🍽️ ➜ ✗' : '✗ ➜ 🍽️';
    
    // Avviso scadenza: solo quando si AGGIUNGE pasto e la deadline è passata
    let htmlAvviso = '';
    if (!haGiaPasto && G_EVENTO_INFO && G_EVENTO_INFO.fine_prenotazione_pasto) {
      const deadline = new Date(G_EVENTO_INFO.fine_prenotazione_pasto);
      const ora = new Date();
      if (ora > deadline) {
        const dataFormattata = deadline.toLocaleString('it-IT', {
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        htmlAvviso = `
          <div style="margin-top: 12px; padding: 10px 14px; background: rgba(255, 193, 7, 0.15); border: 1px solid rgba(255, 193, 7, 0.5); border-radius: 8px;">
            <span style="color: #FFC107; font-size: 13px;">
              ⚠️ <b>Attenzione:</b> le prenotazioni pasto sono chiuse dal ${dataFormattata}
            </span>
          </div>
        `;
      }
    }

    Swal.fire({
      title: `${iconaTitolo} ${azione} Pasto`,
      html: `
        <div style="text-align: left; padding: 15px; background: rgba(255, 193, 7, 0.08); border-radius: 8px; margin-top: 15px;">
          <p style="color: #FFC107; font-weight: bold; margin-bottom: 10px;">
            ${azione} il pasto per:
          </p>
          <p style="font-size: 16px; font-weight: bold; color: #fff; margin: 5px 0;">
            ${nomeCliente}
          </p>
        </div>
        ${htmlAvviso}
        <p style="font-size: 14px; color: #999; margin-top: 15px;">
          Confermi la modifica?
        </p>
      `,
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: haGiaPasto ? 'SÌ, RIMUOVI PASTO' : 'SÌ, AGGIUNGI PASTO',
      cancelButtonText: 'ANNULLA',
      background: '#1e1e1e',
      color: '#fff',
      confirmButtonColor: '#FFC107',
      cancelButtonColor: '#6c757d'
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({
          title: 'Aggiornamento...',
          allowOutsideClick: false,
          allowEscapeKey: false,
          didOpen: () => { Swal.showLoading(); },
          background: '#1e1e1e',
          color: '#fff'
        });
        
        google.script.run.withSuccessHandler(successo => {
          if (successo) {
            Swal.fire({ 
              title: haGiaPasto ? 'Pasto Rimosso' : 'Pasto Aggiunto!', 
              text: nomeCliente,
              icon: 'success', 
              background: '#1e1e1e', 
              color: '#fff', 
              timer: 2000,
              showConfirmButton: false 
            });
            setTimeout(() => caricaDatiGestione(), 1500);
          } else {
            Swal.fire({
              title: 'Errore',
              text: 'Impossibile modificare il pasto. Riprova.',
              icon: 'error',
              background: '#1e1e1e',
              color: '#fff'
            });
          }
        }).azioneTogglePasto(id, nuovoValore);
      }
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // NUOVO: Cambio PR singola prenotazione
  // Dialog con dropdown lista PR
  // ═══════════════════════════════════════════════════════════════
  function cambiaPR(id, nomeCliente, prAttuale, prIdAttuale) {
    // Costruisci opzioni dropdown dalla lista PR globale
    const opzioni = {};
    G_LISTA_PR.forEach(pr => {
      if (pr.id !== prIdAttuale) {
        opzioni[pr.id] = '@' + pr.nickname;
      }
    });

    if (Object.keys(opzioni).length === 0) {
      Swal.fire({
        title: 'Nessun PR disponibile',
        text: 'Non ci sono altri PR nel sistema.',
        icon: 'info',
        background: '#1e1e1e',
        color: '#fff'
      });
      return;
    }

    Swal.fire({
      title: 'Cambia PR',
      html: `
        <div style="text-align: left; padding: 15px; background: rgba(23, 162, 184, 0.1); border-radius: 8px; margin-top: 15px;">
          <p style="color: #17a2b8; font-weight: bold; margin-bottom: 10px;">
            <i class="bi bi-people-fill" style="font-size: 1.2em;"></i> Riassegna prenotazione:
          </p>
          <p style="font-size: 16px; font-weight: bold; color: #fff; margin: 5px 0;">
            ${nomeCliente}
          </p>
          <p style="font-size: 13px; color: #999; margin: 5px 0;">
            PR attuale: <span style="color: #1db954; font-weight: bold;">@${prAttuale}</span>
          </p>
        </div>
      `,
      input: 'select',
      inputOptions: opzioni,
      inputPlaceholder: 'Seleziona nuovo PR...',
      showCancelButton: true,
      confirmButtonText: 'CAMBIA PR',
      cancelButtonText: 'ANNULLA',
      background: '#1e1e1e',
      color: '#fff',
      confirmButtonColor: '#17a2b8',
      cancelButtonColor: '#6c757d',
      inputValidator: (value) => {
        if (!value) return 'Seleziona un PR!';
      },
      customClass: {
        input: 'swal-select-dark'
      }
    }).then((result) => {
      if (result.isConfirmed && result.value) {
        const nuovoPrId = result.value;
        const nuovoPrNick = opzioni[nuovoPrId] || '';

        Swal.fire({
          title: 'Aggiornamento...',
          allowOutsideClick: false,
          allowEscapeKey: false,
          didOpen: () => { Swal.showLoading(); },
          background: '#1e1e1e',
          color: '#fff'
        });

        google.script.run.withSuccessHandler(successo => {
          if (successo) {
            Swal.fire({
              title: 'PR Cambiato!',
              html: `<b>${nomeCliente}</b><br>@${prAttuale} → <span style="color:#1db954;">${nuovoPrNick}</span>`,
              icon: 'success',
              background: '#1e1e1e',
              color: '#fff',
              timer: 2500,
              showConfirmButton: false
            });
            setTimeout(() => caricaDatiGestione(), 1500);
          } else {
            Swal.fire({
              title: 'Errore',
              text: 'Impossibile cambiare il PR. Riprova.',
              icon: 'error',
              background: '#1e1e1e',
              color: '#fff'
            });
          }
        }).azioneCambiaPR(id, nuovoPrId);
      }
    });
  }

  // *** OLD: invariato ***
  function popolaSelettori(eventi, prs) {
    const selEv = document.getElementById('gestione-select-evento');
    if (selEv) {
      selEv.innerHTML = eventi.sort((a,b) => new Date(b.data_evento) - new Date(a.data_evento))
        .map(e => `<option value="${e.id}" ${e.id == G_EVENTO_ID ? 'selected' : ''}>${e.nome_evento}</option>`).join('');
    }

    const selPR = document.getElementById('gestione-select-pr');
    if (selPR) {
      selPR.innerHTML = '<option value="ALL">Tutti i PR (Global)</option>' + 
        prs.map(p => `<option value="${p.nickname}" ${p.nickname === G_PR_NICK ? 'selected' : ''}>@${p.nickname}</option>`).join('');
    }
  }

  // *** OLD: invariato (+ reset scroll) ***
  function cambiaFiltriGestione() {
    G_EVENTO_ID = document.getElementById('gestione-select-evento').value;
    G_PR_NICK = document.getElementById('gestione-select-pr').value;
    G_SCROLL_POS = 0;  // NUOVO: filtro cambiato → torna in cima
    caricaDatiGestione();
  }

  // Avvio
  inizializzaGestione();
</script>
